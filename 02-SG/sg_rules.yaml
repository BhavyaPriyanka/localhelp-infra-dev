- name: SG Rules

  sg:
    - localhelp-dev-db
    - localhelp-dev-backend
    - localhelp-dev-frontend
    - localhelp-dev-bastion
    #- localhelp-dev-ansible 
    - localhelp-dev-app-alb                   #not needed as we are doing pull based from github
    - localhelp-dev-vpn

  vpn:
     - name: vpn_public
       desc: vpn accepting public connections
       source: public
       port: 943,443,22,1194   
  db:
    - name: db_backend
      desc: db accepting backend connections
      source: backend
      port: 3306

    - name: db_bastion
      desc: db accepting bastion host connections
      source: bastion
      port: 22

  backend:
    - name: backend_app_alb
      desc: backend accepting app-alb connections
      source: app_alb
      port: 8080

    - name: backend_bastion
      desc: backend accepting bastion connections
      source: bastion
      port: 22

    - name: backend_vpn_ssh
      desc: backend accepting vpn connections
      source: vpn
      port: 22

    - name: backend_vpn_http
      desc: backend accepting vpn connections
      source: vpn
      port: 8080
    
    - name: db_vpn
      desc: db accepting vpn connections
      source: vpn
      port: 3306

  frontend:
    - name: frontend_public
      desc: frontend accepting public connections
      source: public
      port: 80

    - name: frontend_bastion
      desc: frontend accepting bastion connections
      source: bastion
      port: 22

    # - name: frontend_ansible
    #   desc: frontend accepting ansible connections
    #   source: ansible
    #   port: 22

  bastion:
    - name: bastion_public
      desc: bastion accepting public connections
      source: public
      port: 22

  app_alb:
    - name: app_alb_vpn
      desc: app alb accepting vpn connections
      source: vpn
      port: 80
  # ansible:
  #   - name: ansible_public
  #     desc: ansible accepting public connections
  #     source: public
  #     port: 22